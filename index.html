<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platzhalter</title>
    <style>
        /* Setzt die Seite auf die volle Bildschirmhöhe und zentriert den Inhalt */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa; /* Ein sehr helles, augenfreundliches Grau */
            color: #333333; /* Dunkelgrauer Text für guten Kontrast */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #666666;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div>
        <h1>Dies ist ein Platzhalter.</h1>
        <p>Die finale Seite folgt</p>
    </div>

</body>
</html>
